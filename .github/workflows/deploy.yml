name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build and Bundle
        run: |
          npm run bundle
          # デプロイに必要なファイルを dist に集約
          cp -r resource db package.json package-lock.json dist/
          mkdir -p dist/src
          cp src/style.css dist/src/
        working-directory: app

      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # dist ディレクトリ配下をすべて転送
          source: "app/dist/**"
          target: ${{ secrets.SVR_DIR }}
          strip_components: 2

      - name: Install dependencies and Restart App with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # サーバー上のデプロイディレクトリに移動
            cd ${{ secrets.SVR_DIR }}
            # 依存関係をインストール (ネイティブモジュールのビルドを含む)
            npm install --production
            # 必要ライブラリのインストール (Ubuntu環境を想定)
            sudo apt-get update && sudo apt-get install -y libgomp1 libblas3 liblapack3 || true
            # PM2でプロセスを再起動、存在しない場合は新規起動
            pm2 restart all-tech-list || pm2 start bundle.mjs --name "all-tech-list" --node-args="--env-file=.env"
