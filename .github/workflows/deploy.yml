name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build and Bundle
        run: npm run bundle
        working-directory: app

      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 成果物を転送 (app/dist/ 配下のファイルを対象にする)
          source: "app/dist/bundle.mjs,app/dist/style.css"
          # サーバー上のパス。プロジェクトの構造に合わせて調整してください。
          target: ${{ secrets.SVR_DIR }}
          strip_components: 2

      - name: Restart App with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # サーバー上のデプロイディレクトリに移動
            cd ${{ secrets.SVR_DIR }}
            # PM2でプロセスを再起動、存在しない場合は新規起動
            pm2 restart all-tech-list || pm2 start bundle.mjs --name "all-tech-list" --node-args="--env-file=.env"
